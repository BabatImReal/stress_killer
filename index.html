<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Stress Killer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1d24; }
    body { font-family: "Trebuchet MS", "Segoe UI", sans-serif; user-select: none; -webkit-user-select: none; }
    #app { position: fixed; inset: 0; cursor: crosshair; }
    #app canvas { display: block; }

    #hud { position: fixed; inset: 0; pointer-events: none; }
    #stress-wrap {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      width: min(420px, 70vw); text-align: center;
    }
    #stress-label { color: #fff; font-size: 13px; letter-spacing: 2px; text-shadow: 0 1px 3px rgba(0,0,0,.6); margin-bottom: 5px; }
    #stress-bar { height: 18px; background: rgba(0,0,0,.45); border-radius: 9px; padding: 3px; }
    #stress-fill {
      height: 100%; width: 100%; border-radius: 6px;
      background: linear-gradient(90deg, #ff4d4d, #ff9a3d);
      transition: width .15s ease-out;
    }
    #combo {
      position: absolute; top: 64px; left: 50%; transform: translateX(-50%);
      color: #ffd23d; font-size: 22px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,.6);
      opacity: 0; transition: opacity .2s;
    }
    #hint {
      position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.85); font-size: 15px; text-shadow: 0 1px 3px rgba(0,0,0,.7);
      animation: hintpulse 2s ease-in-out infinite;
    }
    @keyframes hintpulse { 50% { opacity: .5; } }

    #fx-layer { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .float-text {
      position: absolute; transform: translate(-50%, -50%);
      color: #ffe94d; font-weight: bold; font-size: 20px; text-shadow: 0 2px 4px rgba(0,0,0,.7);
      animation: floatup .9s ease-out forwards; white-space: nowrap;
    }
    @keyframes floatup {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -140px) scale(1); }
    }

    #victory {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(10, 12, 18, .55); backdrop-filter: blur(3px); z-index: 10;
    }
    #victory.show { display: flex; }
    #victory-card {
      background: #fffdf5; border-radius: 18px; padding: 36px 48px; text-align: center;
      box-shadow: 0 18px 60px rgba(0,0,0,.5); animation: pop .35s cubic-bezier(.2,1.6,.4,1);
    }
    @keyframes pop { from { transform: scale(.6); opacity: 0; } }
    #victory-card h1 { color: #2c3e50; font-size: 34px; margin-bottom: 6px; }
    #victory-card p { color: #6b7684; font-size: 15px; margin: 4px 0; }
    #victory-card button {
      margin-top: 18px; padding: 12px 30px; font-size: 17px; font-weight: bold;
      color: #fff; background: linear-gradient(135deg, #ff6b4d, #ff9a3d);
      border: none; border-radius: 999px; cursor: pointer; pointer-events: auto;
    }
    #victory-card button:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div id="stress-wrap">
      <div id="stress-label">YOUR STRESS</div>
      <div id="stress-bar"><div id="stress-fill"></div></div>
    </div>
    <div id="combo"></div>
    <div id="hint">Click your boss to relieve stress</div>
  </div>
  <div id="fx-layer"></div>
  <div id="victory">
    <div id="victory-card">
      <h1>STRESS KILLED! 😌</h1>
      <p id="stat-hits"></p>
      <p id="stat-combo"></p>
      <button id="btn-again">Vent again</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
